<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Fireworks Over Vince's Castle — America 250</title>
<style>
  :root {
    --hud-bg: rgba(10, 10, 30, 0.55);
    --hud-border: rgba(255, 255, 255, 0.18);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    overscroll-behavior: none;
  }
  #stage {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    overflow: hidden;
  }

  /* Background layers: two stacked <div>s we crossfade between. */
  .bg-layer {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    transition: opacity 400ms ease;
    will-change: opacity;
  }
  /* Twilight gradient fallback, always behind the photos. */
  #bg-fallback {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, #0a0a2a 0%, #1a1a3e 55%, #050510 100%);
    z-index: 0;
  }
  #bg-a { z-index: 1; opacity: 1; }
  #bg-b { z-index: 1; opacity: 0; }

  #fx {
    position: absolute; inset: 0;
    z-index: 5;
    display: block;
  }

  /* Fallback hint (only shown when photos are missing) */
  #hint {
    position: absolute; left: 50%; top: 14px;
    transform: translateX(-50%);
    z-index: 20;
    padding: 6px 12px;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--hud-border);
    border-radius: 999px;
    pointer-events: none;
    white-space: nowrap;
    display: none;
  }

  /* HUD */
  #hud {
    position: absolute; left: 0; right: 0; bottom: 0;
    z-index: 20;
    display: flex;
    gap: 10px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, rgba(0,0,0,0.45), rgba(0,0,0,0));
    transition: opacity 350ms ease, transform 350ms ease;
    will-change: opacity, transform;
  }
  #hud.hidden {
    opacity: 0;
    transform: translateY(12px);
    pointer-events: none;
  }
  .btn {
    appearance: none;
    border: 1px solid var(--hud-border);
    background: var(--hud-bg);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    line-height: 1;
    padding: 12px 16px;
    min-height: 44px;
    border-radius: 12px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    user-select: none;
    -webkit-user-select: none;
    transition: background 150ms ease, transform 80ms ease, opacity 150ms ease;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.95); }
  .btn.on { background: rgba(220, 60, 60, 0.55); border-color: rgba(255,180,180,0.5); }
  .btn:disabled { opacity: 0.45; cursor: default; }
  .counter {
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    padding: 12px 14px;
    min-height: 44px;
    display: flex; align-items: center;
    background: var(--hud-bg);
    border: 1px solid var(--hud-border);
    border-radius: 12px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    user-select: none; -webkit-user-select: none;
    white-space: nowrap;
  }
  .counter b { font-variant-numeric: tabular-nums; min-width: 1.5em; text-align: right; }

  #finaleBtn { background: rgba(180, 140, 30, 0.45); border-color: rgba(255, 220, 140, 0.5); }
</style>
</head>
<body>
<div id="stage">
  <div id="bg-fallback"></div>
  <div id="bg-a" class="bg-layer"></div>
  <div id="bg-b" class="bg-layer"></div>
  <canvas id="fx"></canvas>
  <div id="hint">Add <b>castle-lawn.jpg</b> / <b>castle-water.jpg</b> next to this file</div>
  <div id="hud">
    <button class="btn" id="sceneBtn" aria-label="Switch scene">🏰 Castle</button>
    <button class="btn" id="finaleBtn" aria-label="Finale">FINALE 🎆</button>
    <div class="counter" aria-label="Burst counter">Bursts:&nbsp;<b id="count">0</b></div>
    <button class="btn on" id="ambientBtn" aria-label="Toggle ambient fireworks">Ambient ✓</button>
    <button class="btn" id="soundBtn" aria-label="Toggle sound">🔇 Mute</button>
  </div>
</div>

<script>
(() => {
  "use strict";

  // ----- Tunable constants -------------------------------------------------
  const HORIZON_Y = 0.65;          // fraction down the screen for the water reflection fold
  const MAX_PARTICLES = 2200;      // hard cap to protect framerate
  const AMBIENT_MIN = 2500;        // ms
  const AMBIENT_MAX = 4000;        // ms
  const AMBIENT_QUIET = 1400;      // don't auto-launch within this long after a user tap
  const HUD_HIDE_MS = 3000;
  const GRAVITY = 0.06;            // per-frame at 60fps baseline (scaled by dt)
  const AIR_DRAG = 0.986;

  // Theme palettes: reds, whites, blues, golds
  const PALETTES = [
    ["#ff3b3b", "#ff6b6b", "#ffd0d0"],         // reds
    ["#ffffff", "#dfe8ff", "#cfe0ff"],         // whites
    ["#3b6bff", "#6b9bff", "#a9c6ff"],         // blues
    ["#ffd23b", "#ffe27a", "#fff0b0"],         // golds
    ["#ff3b3b", "#ffffff", "#3b6bff"],         // RWB mix
  ];

  // ----- Canvas setup ------------------------------------------------------
  const canvas = document.getElementById("fx");
  const ctx = canvas.getContext("2d");
  let W = 0, H = 0, DPR = 1;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2.5);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0); // draw in CSS pixels
  }
  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", resize);
  resize();

  // ----- Background scenes + crossfade ------------------------------------
  const bgFallback = document.getElementById("bg-fallback");
  const bgA = document.getElementById("bg-a");
  const bgB = document.getElementById("bg-b");
  const hint = document.getElementById("hint");

  const SCENES = {
    // Castle is a portrait shot — anchor it to the top so the palmetto flag and
    // tower stay in frame on wide screens, leaving sky above for the fireworks.
    lawn:  { src: "castle-lawn.jpg",  label: "🏰 Castle", next: "water", size: "cover", pos: "50% 0%" },
    water: { src: "castle-water.jpg", label: "🌊 Water",  next: "lawn",  size: "cover", pos: "50% 50%" },
  };
  const loaded = { "castle-lawn.jpg": null, "castle-water.jpg": null };
  let missingCount = 0;

  // Preload both photos; track which are available.
  for (const key of Object.keys(loaded)) {
    const img = new Image();
    img.onload = () => { loaded[key] = true; updateHint(); applyScene(currentScene, true); };
    img.onerror = () => { loaded[key] = false; missingCount++; updateHint(); };
    img.src = key;
  }
  function updateHint() {
    const anyMissing = Object.values(loaded).some(v => v === false);
    hint.style.display = anyMissing ? "block" : "none";
  }

  let currentScene = "lawn";
  let showingA = true; // which bg layer is currently visible

  function bgValue(sceneKey) {
    const src = SCENES[sceneKey].src;
    return loaded[src] ? `url("${src}")` : "none";
  }

  function styleLayer(layer, sceneKey) {
    layer.style.backgroundImage = bgValue(sceneKey);
    layer.style.backgroundSize = SCENES[sceneKey].size;
    layer.style.backgroundPosition = SCENES[sceneKey].pos;
  }

  // First paint
  styleLayer(bgA, currentScene);

  function applyScene(sceneKey, immediate) {
    currentScene = sceneKey;
    if (immediate) {
      styleLayer(showingA ? bgA : bgB, sceneKey);
      return;
    }
    // crossfade: style the incoming layer, flip opacities
    const incoming = showingA ? bgB : bgA;
    const outgoing = showingA ? bgA : bgB;
    styleLayer(incoming, sceneKey);
    incoming.style.opacity = "1";
    outgoing.style.opacity = "0";
    showingA = !showingA;
  }

  // ----- Particle system ---------------------------------------------------
  // Particles share arrays for speed. Each is {x,y,vx,vy,life,maxLife,color,size,gravity,drag,kind}
  const particles = [];     // burst/finale particles
  const rockets = [];       // rising rockets

  function rand(a, b) { return a + Math.random() * (b - a); }
  function pick(arr) { return arr[(Math.random() * arr.length) | 0]; }

  function addParticle(p) {
    if (particles.length >= MAX_PARTICLES) {
      // drop oldest to make room (protects framerate under spam)
      particles.shift();
    }
    particles.push(p);
  }

  // Launch a rocket from bottom edge toward (tx, ty); bursts at ty.
  function launchRocket(tx, ty, opts = {}) {
    ty = Math.max(20, Math.min(ty, H * 0.92));
    const startX = tx + rand(-8, 8);
    const startY = H + 6;
    const palette = opts.palette || pick(PALETTES);
    // Time to apex ~ fixed; compute vy so it decelerates to near-zero at ty.
    const dy = startY - ty;          // positive distance up
    const frames = rand(48, 64);     // ~0.8-1.1s rise
    const vy = -(dy / frames) - 0.5 * GRAVITY * frames; // kinematics for gravity
    const drift = rand(-0.6, 0.6);
    const vx = (tx - startX) / frames + drift * 0.2;
    rockets.push({
      x: startX, y: startY, vx, vy,
      targetY: ty,
      palette,
      crackle: Math.random() < 0.35,
      trail: [],
      sound: opts.sound !== false,
    });
    if (opts.sound !== false) whistle(); // rising whistle as the rocket climbs
  }

  function burst(x, y, palette, count, withCrackle) {
    palette = palette || pick(PALETTES);
    count = count || (60 + (Math.random() * 60 | 0));
    const baseSpeed = rand(2.2, 4.0);
    for (let i = 0; i < count; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = baseSpeed * rand(0.25, 1.0);
      addParticle({
        x, y,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd,
        life: 0,
        maxLife: rand(72, 108),       // ~1.2-1.8s @60fps
        color: pick(palette),
        size: rand(1.4, 2.6),
        gravity: GRAVITY * rand(0.7, 1.1),
        drag: AIR_DRAG,
        kind: "burst",
      });
    }
    if (withCrackle) {
      // second-stage sparkle particles, slightly delayed feel via shorter life + flicker
      const n = 18 + (Math.random() * 16 | 0);
      for (let i = 0; i < n; i++) {
        const ang = Math.random() * Math.PI * 2;
        const spd = baseSpeed * rand(0.1, 0.5);
        addParticle({
          x, y,
          vx: Math.cos(ang) * spd,
          vy: Math.sin(ang) * spd,
          life: 0,
          maxLife: rand(28, 50),
          color: Math.random() < 0.5 ? "#ffffff" : pick(palette),
          size: rand(0.8, 1.6),
          gravity: GRAVITY * 0.5,
          drag: 0.97,
          kind: "crackle",
        });
      }
    }
    bursts++;
    countEl.textContent = bursts;
    pop();
  }

  // ----- Finale: spell "250" ----------------------------------------------
  let finaleActive = false;

  let finaleState = null;

  // Render each digit of "250" separately, sample its filled pixels, then lay
  // the three digits out spread apart in the upper sky. Returns an ORDERED list
  // of target points (digit by digit, left-to-right) so the number can be
  // "written" by a rapid sequence of little shots.
  function buildFinalePoints() {
    const digits = ["2", "5", "0"];
    const dw = 300, dh = 400;
    const off = document.createElement("canvas");
    off.width = dw; off.height = dh;
    const octx = off.getContext("2d");
    octx.textAlign = "center";
    octx.textBaseline = "middle";
    octx.font = "bold 340px Arial, sans-serif";

    const perDigit = digits.map((d) => {
      octx.clearRect(0, 0, dw, dh);
      octx.fillStyle = "#fff";
      octx.fillText(d, dw / 2, dh / 2);
      const data = octx.getImageData(0, 0, dw, dh).data;
      const pts = [];
      let minX = dw, maxX = 0, minY = dh, maxY = 0;
      const step = 11; // a few hundred points total across all three digits
      for (let y = 0; y < dh; y += step) {
        for (let x = 0; x < dw; x += step) {
          if (data[(y * dw + x) * 4 + 3] > 128) {
            pts.push({ x, y });
            if (x < minX) minX = x; if (x > maxX) maxX = x;
            if (y < minY) minY = y; if (y > maxY) maxY = y;
          }
        }
      }
      pts.sort((a, b) => (a.x - b.x) || (a.y - b.y)); // left-to-right writing sweep
      return { pts, minX, maxX, minY, maxY };
    });

    // Lay out the three digits, scaled to a common height, spread apart.
    const targetH = Math.min(H * 0.22, 200);
    const gap = targetH * 0.55; // generous space between the 2, 5 and 0
    const scaled = perDigit.map((g) => {
      const lh = (g.maxY - g.minY) || 1;
      const scale = targetH / lh;
      return { g, scale, w: ((g.maxX - g.minX) || 1) * scale };
    });
    const totalW = scaled.reduce((s, d) => s + d.w, 0) + gap * (scaled.length - 1);
    let cursorX = (W - totalW) / 2;
    const topY = Math.max(28, H * 0.12);
    const gold = ["#ffd23b", "#ffe27a", "#fff0b0", "#ffffff"];

    const ordered = [];
    for (const d of scaled) {
      for (const p of d.g.pts) {
        ordered.push({
          tx: cursorX + (p.x - d.g.minX) * d.scale,
          ty: topY + (p.y - d.g.minY) * d.scale,
          color: pick(gold),
          size: rand(1.9, 2.9),
        });
      }
      cursorX += d.w + gap;
    }
    return ordered;
  }

  function startFinale() {
    if (finaleActive) return;
    finaleActive = true;
    finaleBtn.disabled = true;
    const queue = buildFinalePoints();
    finaleState = {
      queue,
      cores: [],                                   // points written so far (the glowing "250")
      phase: "write",                              // write -> hold -> release
      writeTimer: 0,
      writeInterval: 2.4 / Math.max(1, queue.length), // ~2.4s to draw the whole number
      written: 0,
      holdT: 0, holdDur: 1.2,
      sideTimer: 0.25,
    };
    whistle(); // opening whoosh
  }

  // A tiny sparkle "pop" left where a point of the number was just written.
  function spawnMini(x, y, color) {
    for (let i = 0; i < 5; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = rand(0.3, 1.4);
      addParticle({
        x, y,
        vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
        life: 0, maxLife: rand(20, 38),
        color: Math.random() < 0.5 ? "#ffffff" : color,
        size: rand(1.0, 1.8),
        gravity: GRAVITY * 0.4, drag: 0.95, kind: "crackle",
      });
    }
  }

  function updateFinale(dt) {
    if (!finaleState) return;
    const fs = finaleState;

    if (fs.phase === "write") {
      // Rapid-fire: reveal queued points in order, a few per frame, each with a
      // little sparkle + occasional crack/whistle so you watch 2, then 5, then 0
      // get drawn across the sky.
      fs.writeTimer += dt;
      let guard = 0;
      while (fs.queue.length && fs.writeTimer >= fs.writeInterval && guard < 14) {
        fs.writeTimer -= fs.writeInterval;
        guard++;
        const p = fs.queue.shift();
        fs.cores.push({ x: p.tx, y: p.ty, color: p.color, size: p.size });
        spawnMini(p.tx, p.ty, p.color);
        fs.written++;
        if (fs.written % 5 === 0) pop();        // occasional crack while writing
        if (fs.written % 27 === 0) whistle();   // occasional whistle
      }
      if (!fs.queue.length) { fs.phase = "hold"; fs.holdT = 0; }
    } else if (fs.phase === "hold") {
      // Full "250" glows; fire louder celebratory bursts on either side.
      fs.holdT += dt;
      fs.sideTimer -= dt;
      if (fs.sideTimer <= 0) {
        fs.sideTimer = 0.4;
        const side = Math.random() < 0.5 ? 0.14 : 0.86;
        burst(W * side + rand(-30, 30), rand(H * 0.2, H * 0.45), null, 90, true);
        bigBoom();
      }
      if (fs.holdT >= fs.holdDur) {
        fs.phase = "release";
        for (const c of fs.cores) {
          addParticle({
            x: c.x, y: c.y,
            vx: rand(-1.2, 1.2), vy: rand(-1.6, 0.4),
            life: 0, maxLife: rand(70, 110),
            color: c.color, size: c.size,
            gravity: GRAVITY * rand(0.8, 1.1), drag: AIR_DRAG, kind: "burst",
          });
        }
        bigBoom();
        bursts++; countEl.textContent = bursts;
      }
    } else if (fs.phase === "release") {
      finaleState = null;
      finaleActive = false;
      finaleBtn.disabled = false;
    }
  }

  // ----- Reflection rendering ---------------------------------------------
  // We render particles into the main ctx; for water we additionally draw a
  // flipped, dimmed copy below HORIZON_Y. To keep it cheap we re-draw the
  // particle dots into the reflected region rather than copying pixels.
  function drawParticleDot(c, x, y, size, color, alpha) {
    c.globalAlpha = alpha;
    c.fillStyle = color;
    c.beginPath();
    c.arc(x, y, size, 0, Math.PI * 2);
    c.fill();
  }

  // ----- Main loop ---------------------------------------------------------
  let bursts = 0;
  let lastTime = performance.now();

  function frame(now) {
    let dt = (now - lastTime) / 1000;
    if (dt > 0.05) dt = 0.05; // clamp big gaps (tab switches)
    lastTime = now;
    const fdt = dt * 60; // frame-normalized factor (1.0 == 60fps step)

    // Trails: fade by ERASING canvas alpha (destination-out), not by painting
    // black. This keeps the canvas transparent over the photo while leaving a
    // fading motion-blur glow behind moving particles.
    ctx.globalCompositeOperation = "destination-out";
    ctx.globalAlpha = 1;
    ctx.fillStyle = "rgba(0,0,0,0.30)";
    ctx.fillRect(0, 0, W, H);

    ctx.globalCompositeOperation = "lighter";

    const reflect = currentScene === "water";
    const foldY = H * HORIZON_Y;

    // --- Rockets ---
    for (let i = rockets.length - 1; i >= 0; i--) {
      const r = rockets[i];
      r.vy += GRAVITY * fdt;
      r.x += r.vx * fdt;
      r.y += r.vy * fdt;

      // trail history
      r.trail.push({ x: r.x, y: r.y });
      if (r.trail.length > 6) r.trail.shift();

      // draw trail
      for (let t = 0; t < r.trail.length; t++) {
        const pt = r.trail[t];
        const a = (t / r.trail.length) * 0.6;
        drawParticleDot(ctx, pt.x, pt.y, 1.6, pick(r.palette), a);
      }
      // head
      drawParticleDot(ctx, r.x, r.y, 2.2, "#fff", 0.9);

      // burst when reaching apex / target
      if (r.y <= r.targetY || r.vy >= 0) {
        burst(r.x, r.y, r.palette, 0, r.crackle);
        rockets.splice(i, 1);
      }
    }

    // --- Particles ---
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life += fdt;
      if (p.life >= p.maxLife) { particles.splice(i, 1); continue; }
      p.vx *= Math.pow(p.drag, fdt);
      p.vy *= Math.pow(p.drag, fdt);
      p.vy += p.gravity * fdt;
      p.x += p.vx * fdt;
      p.y += p.vy * fdt;

      const lifeFrac = 1 - p.life / p.maxLife;
      let alpha = lifeFrac;
      if (p.kind === "crackle") {
        // flicker
        alpha *= (Math.random() < 0.6 ? 1 : 0.3);
      }
      drawParticleDot(ctx, p.x, p.y, p.size, p.color, alpha);

      // reflection (water only): mirror across foldY, dimmed
      if (reflect && p.y < foldY) {
        const ry = foldY + (foldY - p.y);
        if (ry < H) {
          drawParticleDot(ctx, p.x, ry, p.size * 1.05, p.color, alpha * 0.35);
        }
      }
    }

    // --- Finale: draw the accumulated glowing "250" as it's written + held ---
    if (finaleState) {
      updateFinale(dt);
      if (finaleState && finaleState.phase !== "release") {
        const shimmer = 0.8 + Math.sin(now / 80) * 0.2;
        for (const c of finaleState.cores) {
          drawParticleDot(ctx, c.x, c.y, c.size, c.color, shimmer);
          if (reflect && c.y < foldY) {
            const ry = foldY + (foldY - c.y);
            if (ry < H) drawParticleDot(ctx, c.x, ry, c.size, c.color, shimmer * 0.35);
          }
        }
      }
    }

    // --- Ambient auto-launch ---
    maybeAmbient(now);

    ctx.globalCompositeOperation = "source-over";
    ctx.globalAlpha = 1;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ----- Ambient -----------------------------------------------------------
  let ambientOn = true;
  let nextAmbient = performance.now() + rand(AMBIENT_MIN, AMBIENT_MAX);
  let lastUserTap = 0;

  function maybeAmbient(now) {
    if (!ambientOn) { nextAmbient = now + rand(AMBIENT_MIN, AMBIENT_MAX); return; }
    if (now < nextAmbient) return;
    nextAmbient = now + rand(AMBIENT_MIN, AMBIENT_MAX);
    if (now - lastUserTap < AMBIENT_QUIET) return;
    if (finaleActive) return;
    const x = rand(W * 0.12, W * 0.88);
    const y = rand(H * 0.12, H * 0.42);
    launchRocket(x, y, { sound: false });
  }

  // ----- Input -------------------------------------------------------------
  function handleLaunch(clientX, clientY) {
    lastUserTap = performance.now();
    launchRocket(clientX, clientY);
    showHud();
  }

  // Pointer events cover mouse + touch + pen, and multi-touch fires multiple.
  canvas.addEventListener("pointerdown", (e) => {
    handleLaunch(e.clientX, e.clientY);
  });
  // Touchstart fallback for multi-touch on browsers that coalesce pointers.
  canvas.addEventListener("touchstart", (e) => {
    // pointerdown already handles single; here we catch extra simultaneous touches
    if (e.touches && e.touches.length > 1) {
      for (let i = 0; i < e.changedTouches.length; i++) {
        const t = e.changedTouches[i];
        handleLaunch(t.clientX, t.clientY);
      }
    }
    e.preventDefault();
  }, { passive: false });

  // ----- HUD show/hide -----------------------------------------------------
  const hud = document.getElementById("hud");
  let hudTimer = null;
  function showHud() {
    hud.classList.remove("hidden");
    if (hudTimer) clearTimeout(hudTimer);
    hudTimer = setTimeout(() => hud.classList.add("hidden"), HUD_HIDE_MS);
  }
  window.addEventListener("mousemove", showHud);
  showHud();

  // ----- HUD controls ------------------------------------------------------
  const sceneBtn = document.getElementById("sceneBtn");
  const finaleBtn = document.getElementById("finaleBtn");
  const ambientBtn = document.getElementById("ambientBtn");
  const soundBtn = document.getElementById("soundBtn");
  const countEl = document.getElementById("count");

  sceneBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    const nextKey = SCENES[currentScene].next;
    applyScene(nextKey, false);
    sceneBtn.textContent = SCENES[nextKey].label;
    showHud();
  });

  finaleBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    startFinale();
    showHud();
  });

  ambientBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    ambientOn = !ambientOn;
    ambientBtn.textContent = ambientOn ? "Ambient ✓" : "Ambient ✕";
    ambientBtn.classList.toggle("on", ambientOn);
    showHud();
  });

  // Prevent HUD button taps from also launching a rocket via the canvas.
  hud.addEventListener("pointerdown", (e) => e.stopPropagation());

  // ----- Sound (WebAudio synth pop, default OFF) --------------------------
  let soundOn = false;
  let audioCtx = null;
  // Synthesized firework explosion: a filtered white-noise burst (the "crack")
  // layered over a low sine thump (the "boom"). No audio files.
  function pop() {
    if (!soundOn || !audioCtx) return;
    const now = audioCtx.currentTime;
    const dur = rand(0.35, 0.55);

    // --- noise crack ---
    const n = Math.floor(audioCtx.sampleRate * dur);
    const buffer = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < n; i++) {
      // white noise with a fast exponential-ish amplitude decay
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 2.2);
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const nf = audioCtx.createBiquadFilter();
    nf.type = "lowpass";
    nf.frequency.setValueAtTime(rand(1600, 2400), now);
    nf.frequency.exponentialRampToValueAtTime(180, now + dur);
    const ng = audioCtx.createGain();
    ng.gain.setValueAtTime(0.0001, now);
    ng.gain.exponentialRampToValueAtTime(0.45, now + 0.008);
    ng.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    noise.connect(nf).connect(ng).connect(audioCtx.destination);
    noise.start(now);
    noise.stop(now + dur);

    // --- low boom ---
    const osc = audioCtx.createOscillator();
    const og = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(rand(85, 110), now);
    osc.frequency.exponentialRampToValueAtTime(42, now + 0.3);
    og.gain.setValueAtTime(0.0001, now);
    og.gain.exponentialRampToValueAtTime(0.4, now + 0.02);
    og.gain.exponentialRampToValueAtTime(0.0001, now + 0.38);
    osc.connect(og).connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.4);
  }

  // Rising whistle as a rocket climbs (classic firework "weeee").
  function whistle() {
    if (!soundOn || !audioCtx) return;
    const now = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = "sine";
    o.frequency.setValueAtTime(680, now);
    o.frequency.exponentialRampToValueAtTime(1750, now + 0.6);
    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(0.07, now + 0.06);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.66);
    o.connect(g).connect(audioCtx.destination);
    o.start(now);
    o.stop(now + 0.68);
  }

  // Louder, deeper explosion — used for the finale for contrast against pop().
  function bigBoom() {
    if (!soundOn || !audioCtx) return;
    const now = audioCtx.currentTime;
    const dur = rand(0.55, 0.75);
    const n = Math.floor(audioCtx.sampleRate * dur);
    const buffer = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < n; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 1.8);
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const nf = audioCtx.createBiquadFilter();
    nf.type = "lowpass";
    nf.frequency.setValueAtTime(rand(1400, 2000), now);
    nf.frequency.exponentialRampToValueAtTime(120, now + dur);
    const ng = audioCtx.createGain();
    ng.gain.setValueAtTime(0.0001, now);
    ng.gain.exponentialRampToValueAtTime(0.85, now + 0.01);
    ng.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    noise.connect(nf).connect(ng).connect(audioCtx.destination);
    noise.start(now);
    noise.stop(now + dur);

    const osc = audioCtx.createOscillator();
    const og = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(rand(70, 90), now);
    osc.frequency.exponentialRampToValueAtTime(34, now + 0.4);
    og.gain.setValueAtTime(0.0001, now);
    og.gain.exponentialRampToValueAtTime(0.8, now + 0.02);
    og.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
    osc.connect(og).connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.52);
  }

  soundBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    soundOn = !soundOn;
    if (soundOn && !audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (_) { audioCtx = null; soundOn = false; }
    }
    if (soundOn && audioCtx && audioCtx.state === "suspended") audioCtx.resume();
    soundBtn.textContent = soundOn ? "🔊 Sound" : "🔇 Mute";
    soundBtn.classList.toggle("on", soundOn);
    showHud();
  });

  // Kick off with a welcoming burst or two once layout settles.
  setTimeout(() => {
    launchRocket(W * 0.35, H * 0.3, { sound: false });
    launchRocket(W * 0.65, H * 0.25, { sound: false });
  }, 600);

})();
</script>
</body>
</html>
